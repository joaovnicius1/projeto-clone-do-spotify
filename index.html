<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/6994f1e20d.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <title>Music</title>
</head>
<body>
    <div class="container">
        <nav>
            <div class="nav-logo">
                <i class="fa-brands fa-spotify"></i>
            </div>
            <div>
                <i class="fa-solid fa-book"></i>
                <p>Sua Biblioteca+</p>
            </div>
            <div>
                <h5>Crie sua primeira Playlist</h5>
                <p>è fácil, vamos te ajudar</p>
                <button>Criar Playlist</button>
            </div>
            <div class="nav-podcast">
                <h5>Que tal seguir um podcast?</h5>
                <p>Avisaremos você sobre nossos episódios</p>
                <button>Explore Podcast</button>
            </div>
            <div class="nav-footer">
                <a href="#">Legal</a>
                <a href="#">Centro de Privacidade</a>
                <a href="#">Politica de Privacidade</a>
                <a href="#">Cookies</a>
                <a href="#">Sobre anúncios</a>
                <a href="#">Acessibilidade</a>
            </div>
            <button class="nav-lang-button">
                <i class="fa-solid fa-globe"></i>
                Português do Brasil
            </button>
        </nav>
    </div>
    <main>
        <header>
            <button>
                <i class="fa-solid fa-magnifying-glass"></i>
                <input placeholder="O que você quer ouvir?">
            </button>
        </header>
        <section class="conteudo">
            <h2>Artistas Populares</h2>
            <div class="grid-artistas">

            </div>

            <h2>Albuns Populares</h2>
            <div class="albums-grid">

            </div>
        </section>

    </main>
</body>
</html>
